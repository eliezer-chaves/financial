<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Transações Financeiras</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            padding-top: 20px;
        }
        .card {
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .table-responsive {
            margin-top: 20px;
        }
        .action-buttons {
            white-space: nowrap;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">Gestão de Transações Financeiras</h1>
        
        <div class="row">
            <div class="col-md-12">
                <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#addTransactionModal">
                    <i class="fas fa-plus"></i> Nova Transação
                </button>
            </div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Carregando...</span>
            </div>
            <p>Carregando transações...</p>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Data</th>
                        <th>Tipo</th>
                        <th>Corretora</th>
                        <th>Ticker</th>
                        <th>Quantidade</th>
                        <th>Valor</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="transactionsTable">
                    <!-- Dados serão inseridos via JavaScript -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal Adicionar Transação -->
    <div class="modal fade" id="addTransactionModal" tabindex="-1" aria-labelledby="addTransactionModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="addTransactionModalLabel">Nova Transação</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="transactionForm">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="transactionType" class="form-label">Tipo de Transação</label>
                                    <select class="form-select" id="transactionType" required>
                                        <option value="">Selecione...</option>
                                        <option value="1">Venda</option>
                                        <option value="2">Compra</option>
                                        <option value="3">Aporte</option>
                                        <option value="4">Proventos</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="brokerage" class="form-label">Corretora</label>
                                    <select class="form-select" id="brokerage" required>
                                        <option value="">Selecione...</option>
                                        <option value="2">Rico</option>
                                        <option value="3">Inter</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="ticker" class="form-label">Ticker</label>
                                    <input type="text" class="form-control" id="ticker" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="assetClass" class="form-label">Classe do Ativo</label>
                                    <select class="form-select" id="assetClass" required>
                                        <option value="">Selecione...</option>
                                        <option value="1">Fundo Imobiliário</option>
                                        <option value="2">Ação</option>
                                        <option value="3">Aporte</option>
                                        <option value="4">Dividendo</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label for="quantity" class="form-label">Quantidade</label>
                                    <input type="number" step="0.01" class="form-control" id="quantity" required>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label for="value" class="form-label">Valor Unitário</label>
                                    <input type="number" step="0.01" class="form-control" id="value" required>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="mb-3">
                                    <label for="tax" class="form-label">Taxas</label>
                                    <input type="number" step="0.01" class="form-control" id="tax" value="0">
                                </div>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="date" class="form-label">Data</label>
                                    <input type="date" class="form-control" id="date" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label for="amount" class="form-label">Valor Total</label>
                                    <input type="number" step="0.01" class="form-control" id="amount" readonly>
                                </div>
                            </div>
                        </div>
                        
                        <input type="hidden" id="transactionId">
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="saveTransaction">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS e Popper.js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script>
        // Configuração do Supabase
        const supabaseUrl = 'SUA_URL_DO_SUPABASE';
        const supabaseKey = 'SUA_CHAVE_DO_SUPABASE';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // Variáveis globais
        let transactions = [];
        let currentEditId = null;

        // DOM Ready
        document.addEventListener('DOMContentLoaded', function() {
            // Carrega as transações ao iniciar
            loadTransactions();

            // Configura eventos
            setupEventListeners();
        });

        // Configura os listeners de eventos
        function setupEventListeners() {
            // Calcula valor total quando quantidade ou valor unitário muda
            document.getElementById('quantity').addEventListener('input', calculateTotal);
            document.getElementById('value').addEventListener('input', calculateTotal);
            
            // Salva a transação
            document.getElementById('saveTransaction').addEventListener('click', saveTransaction);
            
            // Limpa o modal quando fecha
            document.getElementById('addTransactionModal').addEventListener('hidden.bs.modal', resetForm);
        }

        // Carrega as transações do Supabase
        async function loadTransactions() {
            showLoading(true);
            
            try {
                const { data, error } = await supabase
                    .from('transaction')
                    .select(`
                        id_transaction,
                        date,
                        quantity,
                        value,
                        tax,
                        amount,
                        brokerage: id_brokerage (name),
                        transaction_type: id_transaction_type (name),
                        ticker: id_ticker (ticker_name)
                    `)
                    .order('date', { ascending: false });

                if (error) throw error;
                
                transactions = data || [];
                renderTransactions();
            } catch (error) {
                console.error('Erro ao carregar transações:', error);
                alert('Erro ao carregar transações. Verifique o console para mais detalhes.');
            } finally {
                showLoading(false);
            }
        }

        // Renderiza as transações na tabela
        function renderTransactions() {
            const tableBody = document.getElementById('transactionsTable');
            tableBody.innerHTML = '';

            if (transactions.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="8" class="text-center">Nenhuma transação encontrada</td></tr>';
                return;
            }

            transactions.forEach(transaction => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${transaction.id_transaction}</td>
                    <td>${new Date(transaction.date).toLocaleDateString()}</td>
                    <td>${transaction.transaction_type?.name || 'N/A'}</td>
                    <td>${transaction.brokerage?.name || 'N/A'}</td>
                    <td>${transaction.ticker?.ticker_name || 'N/A'}</td>
                    <td>${transaction.quantity}</td>
                    <td>R$ ${transaction.value.toFixed(2)}</td>
                    <td class="action-buttons">
                        <button class="btn btn-sm btn-warning me-1 edit-btn" data-id="${transaction.id_transaction}">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn btn-sm btn-danger delete-btn" data-id="${transaction.id_transaction}">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
                
                tableBody.appendChild(row);
            });

            // Adiciona eventos aos botões de edição e exclusão
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', (e) => editTransaction(e.target.closest('button').dataset.id));
            });
            
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => deleteTransaction(e.target.closest('button').dataset.id));
            });
        }

        // Calcula o valor total da transação
        function calculateTotal() {
            const quantity = parseFloat(document.getElementById('quantity').value) || 0;
            const value = parseFloat(document.getElementById('value').value) || 0;
            const tax = parseFloat(document.getElementById('tax').value) || 0;
            
            const total = (quantity * value) + tax;
            document.getElementById('amount').value = total.toFixed(2);
        }

        // Preenche o formulário para edição
        async function editTransaction(id) {
            currentEditId = id;
            const transaction = transactions.find(t => t.id_transaction == id);
            
            if (!transaction) return;
            
            // Primeiro, precisamos obter o id_ticker e o id_class associados
            try {
                const { data: tickerData, error: tickerError } = await supabase
                    .from('ticker')
                    .select('id_ticker, ticker_name, id_class')
                    .eq('ticker_name', transaction.ticker?.ticker_name || '')
                    .single();

                if (tickerError) throw tickerError;
                
                // Preenche o formulário
                document.getElementById('transactionType').value = transaction.id_transaction_type;
                document.getElementById('brokerage').value = transaction.id_brokerage;
                document.getElementById('ticker').value = transaction.ticker?.ticker_name || '';
                document.getElementById('assetClass').value = tickerData?.id_class || '';
                document.getElementById('quantity').value = transaction.quantity;
                document.getElementById('value').value = transaction.value;
                document.getElementById('tax').value = transaction.tax;
                document.getElementById('amount').value = transaction.amount;
                document.getElementById('date').value = transaction.date.split('T')[0];
                document.getElementById('transactionId').value = id;
                
                // Abre o modal
                const modal = new bootstrap.Modal(document.getElementById('addTransactionModal'));
                modal.show();
                
            } catch (error) {
                console.error('Erro ao carregar dados para edição:', error);
                alert('Erro ao carregar dados para edição. Verifique o console para mais detalhes.');
            }
        }

        // Salva a transação (cria ou atualiza)
        async function saveTransaction() {
            const form = document.getElementById('transactionForm');
            if (!form.checkValidity()) {
                form.classList.add('was-validated');
                return;
            }

            showLoading(true);
            
            try {
                const transactionData = {
                    id_transaction_type: document.getElementById('transactionType').value,
                    id_brokerage: document.getElementById('brokerage').value,
                    quantity: parseFloat(document.getElementById('quantity').value),
                    value: parseFloat(document.getElementById('value').value),
                    tax: parseFloat(document.getElementById('tax').value),
                    amount: parseFloat(document.getElementById('amount').value),
                    date: document.getElementById('date').value,
                };

                const tickerName = document.getElementById('ticker').value.trim();
                const assetClass = document.getElementById('assetClass').value;
                
                // Primeiro, verifica/insere o ticker
                let { data: ticker, error: tickerError } = await supabase
                    .from('ticker')
                    .select('id_ticker')
                    .eq('ticker_name', tickerName)
                    .single();

                if (tickerError && tickerError.code !== 'PGRST116') {
                    throw tickerError;
                }

                if (!ticker) {
                    // Se o ticker não existe, cria um novo
                    const { data: newTicker, error: newTickerError } = await supabase
                        .from('ticker')
                        .insert([
                            { 
                                ticker_name: tickerName,
                                id_class: assetClass
                            }
                        ])
                        .select()
                        .single();

                    if (newTickerError) throw newTickerError;
                    ticker = newTicker;
                }

                transactionData.id_ticker = ticker.id_ticker;
                
                // Se estiver editando
                if (currentEditId) {
                    const { error } = await supabase
                        .from('transaction')
                        .update(transactionData)
                        .eq('id_transaction', currentEditId);
                    
                    if (error) throw error;
                    alert('Transação atualizada com sucesso!');
                } else {
                    // Se estiver criando
                    const { error } = await supabase
                        .from('transaction')
                        .insert([transactionData]);
                    
                    if (error) throw error;
                    alert('Transação criada com sucesso!');
                }
                
                // Recarrega as transações e fecha o modal
                loadTransactions();
                const modal = bootstrap.Modal.getInstance(document.getElementById('addTransactionModal'));
                modal.hide();
                
            } catch (error) {
                console.error('Erro ao salvar transação:', error);
                alert('Erro ao salvar transação. Verifique o console para mais detalhes.');
            } finally {
                showLoading(false);
            }
        }

        // Deleta uma transação
        async function deleteTransaction(id) {
            if (!confirm('Tem certeza que deseja excluir esta transação?')) return;
            
            showLoading(true);
            
            try {
                const { error } = await supabase
                    .from('transaction')
                    .delete()
                    .eq('id_transaction', id);
                
                if (error) throw error;
                
                alert('Transação excluída com sucesso!');
                loadTransactions();
            } catch (error) {
                console.error('Erro ao excluir transação:', error);
                alert('Erro ao excluir transação. Verifique o console para mais detalhes.');
            } finally {
                showLoading(false);
            }
        }

        // Reseta o formulário
        function resetForm() {
            document.getElementById('transactionForm').reset();
            document.getElementById('transactionForm').classList.remove('was-validated');
            document.getElementById('transactionId').value = '';
            currentEditId = null;
        }

        // Mostra/oculta o loading
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }
    </script>
</body>
</html>
