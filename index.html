<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão Financeira</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            background-color: #f8f9fa;
            padding-top: 20px;
        }
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        .table-responsive {
            margin-top: 20px;
        }
        .action-buttons {
            white-space: nowrap;
        }
        .invalid-feedback {
            display: none;
            color: #dc3545;
            font-size: 0.875em;
        }
        .was-validated .form-control:invalid ~ .invalid-feedback {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="text-center mb-4">Gestão de Transações</h1>
        
        <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#transactionModal">
            <i class="fas fa-plus"></i> Nova Transação
        </button>

        <div class="table-responsive">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Data</th>
                        <th>Tipo</th>
                        <th>Valor</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="transactionsTable"></tbody>
            </table>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="transactionModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Nova Transação</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="transactionForm" class="needs-validation" novalidate>
                        <input type="hidden" id="transactionId">
                        <div class="mb-3">
                            <label class="form-label">Tipo</label>
                            <select class="form-select" id="transactionType" required>
                                <option value="">Selecione...</option>
                                <option value="1">Venda</option>
                                <option value="2">Compra</option>
                            </select>
                            <div class="invalid-feedback">Selecione o tipo</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Valor</label>
                            <input type="number" step="0.01" class="form-control" id="amount" required>
                            <div class="invalid-feedback">Informe o valor</div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Data</label>
                            <input type="date" class="form-control" id="date" required>
                            <div class="invalid-feedback">Informe a data</div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="saveBtn">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="loading" id="loading">
        <div class="spinner-border text-light" role="status">
            <span class="visually-hidden">Carregando...</span>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
   
    <script>
const supabaseUrl = 'https://ttuwpchkotalpponbjzv.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR0dXdwY2hrb3RhbHBwb25ianp2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDM0MzY3NTksImV4cCI6MjA1OTAxMjc1OX0.gL_1exIGEYLiU475i_vcm06nt39VkgX7OYauMuxWDDY';
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
        console.log("Fora");
</script>

    <script>
        // Configuração e inicialização segura
        document.addEventListener('DOMContentLoaded', async () => {
            console.log("DOM");
            // 2. Elementos DOM
            const transactionsTable = document.getElementById('transactionsTable');
            const transactionForm = document.getElementById('transactionForm');
            const saveBtn = document.getElementById('saveBtn');
            const loading = document.getElementById('loading');
            
            // 3. Variáveis de estado
            let currentTransactionId = null;
            
            // 4. Event Listeners
            saveBtn.addEventListener('click', saveTransaction);
            
            // 5. Carrega dados iniciais
            await loadTransactions();
            
            // Funções principais
            async function loadTransactions() {
                showLoading(true);
                try {
                    const { data, error } = await supabaseClient
                        .from('transaction')
                        .select('*')
                        .order('date', { ascending: false });
                    
                    if (error) throw error;
                    
                    renderTransactions(data || []);
                } catch (error) {
                    console.error('Erro ao carregar:', error);
                    alert('Erro ao carregar transações');
                } finally {
                    showLoading(false);
                }
            }
            
            function renderTransactions(transactions) {
                transactionsTable.innerHTML = '';
                
                if (transactions.length === 0) {
                    transactionsTable.innerHTML = '<tr><td colspan="5">Nenhuma transação</td></tr>';
                    return;
                }
                
                transactions.forEach(transaction => {
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${transaction.id}</td>
                        <td>${new Date(transaction.date).toLocaleDateString()}</td>
                        <td>${getTransactionTypeName(transaction.type)}</td>
                        <td>R$ ${transaction.amount.toFixed(2)}</td>
                        <td class="action-buttons">
                            <button class="btn btn-sm btn-warning edit-btn" data-id="${transaction.id}">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn btn-sm btn-danger delete-btn" data-id="${transaction.id}">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    `;
                    transactionsTable.appendChild(row);
                });
                
                // Adiciona eventos aos botões
                document.querySelectorAll('.edit-btn').forEach(btn => {
                    btn.addEventListener('click', () => editTransaction(btn.dataset.id));
                });
                
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', () => deleteTransaction(btn.dataset.id));
                });
            }
            
            async function saveTransaction() {
                if (!transactionForm.checkValidity()) {
                    transactionForm.classList.add('was-validated');
                    return;
                }
                
                showLoading(true);
                
                try {
                    const transactionData = {
                        type: document.getElementById('transactionType').value,
                        amount: parseFloat(document.getElementById('amount').value),
                        date: document.getElementById('date').value
                    };
                    
                    if (currentTransactionId) {
                        // Edição
                        const { error } = await supabaseClient
                            .from('transaction')
                            .update(transactionData)
                            .eq('id', currentTransactionId);
                        
                        if (error) throw error;
                    } else {
                        // Criação
                        const { error } = await supabaseClient
                            .from('transaction')
                            .insert([transactionData]);
                        
                        if (error) throw error;
                    }
                    
                    // Recarrega e fecha modal
                    await loadTransactions();
                    bootstrap.Modal.getInstance(document.getElementById('transactionModal')).hide();
                    resetForm();
                    
                } catch (error) {
                    console.error('Erro ao salvar:', error);
                    alert('Erro ao salvar transação');
                } finally {
                    showLoading(false);
                }
            }
            
            async function editTransaction(id) {
                showLoading(true);
                try {
                    const { data, error } = await supabaseClient
                        .from('transaction')
                        .select('*')
                        .eq('id', id)
                        .single();
                    
                    if (error) throw error;
                    
                    // Preenche formulário
                    document.getElementById('transactionType').value = data.type;
                    document.getElementById('amount').value = data.amount;
                    document.getElementById('date').value = data.date.split('T')[0];
                    document.getElementById('transactionId').value = data.id;
                    currentTransactionId = data.id;
                    
                    // Abre modal
                    const modal = new bootstrap.Modal(document.getElementById('transactionModal'));
                    modal.show();
                    
                } catch (error) {
                    console.error('Erro ao editar:', error);
                    alert('Erro ao carregar transação');
                } finally {
                    showLoading(false);
                }
            }
            
            async function deleteTransaction(id) {
                if (!confirm('Confirmar exclusão?')) return;
                
                showLoading(true);
                try {
                    const { error } = await supabaseClient
                        .from('transaction')
                        .delete()
                        .eq('id', id);
                    
                    if (error) throw error;
                    
                    await loadTransactions();
                } catch (error) {
                    console.error('Erro ao excluir:', error);
                    alert('Erro ao excluir transação');
                } finally {
                    showLoading(false);
                }
            }
            
            function resetForm() {
                transactionForm.reset();
                transactionForm.classList.remove('was-validated');
                currentTransactionId = null;
            }
            
            function showLoading(show) {
                loading.style.display = show ? 'flex' : 'none';
            }
            
            function getTransactionTypeName(type) {
                const types = {
                    1: 'Venda',
                    2: 'Compra',
                    3: 'Aporte',
                    4: 'Proventos'
                };
                return types[type] || 'Desconhecido';
            }
        });
    </script>
</body>
</html>
